name: f_clean
description: "Flutter SaaS MVP — Clean Architecture + Bloc + GoRouter"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Icons
  cupertino_icons: ^1.0.8

  # State Management
  flutter_bloc: ^9.1.1
  equatable: ^2.0.7

  # Dependency Injection
  get_it: ^9.2.1
  injectable: ^2.5.0

  # Network
  dio: ^5.8.0+1

  # Logging & Error Tracking
  talker: ^5.1.14
  talker_flutter: ^5.1.14
  talker_dio_logger: ^5.1.14
  talker_bloc_logger: ^5.1.14

  # Models & Serialization
  freezed_annotation: ^3.1.0
  json_annotation: ^4.9.0
  dartz: ^0.10.1

  # Navigation
  go_router: ^17.1.0

  # Local Storage
  flutter_secure_storage: ^10.0.0
  shared_preferences: ^2.5.3

  # Theme
  flex_color_scheme: ^8.2.0

  # Localization (slang runtime)
  slang: ^4.4.0
  slang_flutter: ^4.4.0

  # Crash Reporting
  # sentry_flutter: ^8.14.2  # removed — add back once Android Kotlin compat is resolved

  # Push Notifications (local only — add firebase_core + firebase_messaging when FCM config files are added)
  flutter_local_notifications: ^21.0.0

  # Environment
  envied: ^1.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Linting
  flutter_lints: ^6.0.0

  # Code Generation
  build_runner: ^2.4.15
  freezed: ^3.2.5
  json_serializable: ^6.9.5
  injectable_generator: ^2.7.0
  envied_generator: ^1.1.1
  slang_build_runner: ^4.4.0

  # Testing
  bloc_test: ^10.0.0
  mocktail: ^1.0.4

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
